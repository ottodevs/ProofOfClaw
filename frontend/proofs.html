<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proof Verification — Proof of Claw</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg-primary: #06080d;
  --bg-secondary: #0c1018;
  --bg-card: #0f1520;
  --bg-card-hover: #141c2a;
  --cyan: #00e5ff;
  --cyan-dim: #00a3b5;
  --cyan-glow: rgba(0, 229, 255, 0.15);
  --amber: #ffb300;
  --green: #00e676;
  --red: #ff3d5a;
  --purple: #b388ff;
  --text-primary: #e8ecf4;
  --text-secondary: #8892a4;
  --text-dim: #4a5568;
  --border: rgba(255, 255, 255, 0.06);
  --border-cyan: rgba(0, 229, 255, 0.2);
  --font-display: 'Syne', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}

body {
  font-family: var(--font-mono);
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.6;
  font-size: 14px;
  min-height: 100vh;
}

/* Scanline overlay */
body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0, 229, 255, 0.008) 2px,
    rgba(0, 229, 255, 0.008) 4px
  );
  pointer-events: none;
  z-index: 9999;
}

/* Grid background */
body::after {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background-image:
    linear-gradient(rgba(0, 229, 255, 0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0, 229, 255, 0.03) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none;
  z-index: -1;
}

/* ===================== SIDEBAR ===================== */
.sidebar {
  position: fixed;
  top: 0; left: 0; bottom: 0;
  width: 240px;
  background: var(--bg-secondary);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  z-index: 100;
  padding: 1.5rem 0;
}

.sidebar-logo {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  padding: 0 1.25rem;
  margin-bottom: 2rem;
  text-decoration: none;
}

.sidebar-logo .claw-symbol {
  font-size: 1.6rem;
  color: var(--cyan);
  filter: drop-shadow(0 0 8px var(--cyan));
  line-height: 1;
}

.sidebar-logo .logo-text {
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 1rem;
  color: var(--text-primary);
  letter-spacing: -0.02em;
}

.sidebar-nav {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.sidebar-nav a {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  padding: 0.7rem 1.25rem;
  text-decoration: none;
  color: var(--text-secondary);
  font-size: 0.8rem;
  font-weight: 500;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  transition: all 0.2s;
  border-left: 3px solid transparent;
}

.sidebar-nav a:hover {
  color: var(--text-primary);
  background: rgba(255, 255, 255, 0.02);
}

.sidebar-nav a.active {
  color: var(--cyan);
  border-left-color: var(--cyan);
  background: rgba(0, 229, 255, 0.05);
}

.sidebar-nav a .nav-icon {
  font-size: 1rem;
  width: 20px;
  text-align: center;
}

.sidebar-bottom {
  padding: 1rem 1.25rem;
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
  border-top: 1px solid var(--border);
  margin-top: auto;
}

.btn-new-agent {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.5rem;
  padding: 0.65rem 1rem;
  background: linear-gradient(135deg, rgba(0, 229, 255, 0.12), rgba(0, 229, 255, 0.04));
  border: 1px solid var(--border-cyan);
  border-radius: 8px;
  color: var(--cyan);
  font-family: var(--font-mono);
  font-size: 0.78rem;
  font-weight: 600;
  text-decoration: none;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  transition: all 0.25s;
  cursor: pointer;
}

.btn-new-agent:hover {
  background: rgba(0, 229, 255, 0.18);
  box-shadow: 0 0 20px rgba(0, 229, 255, 0.1);
}

.btn-back-home {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.5rem;
  padding: 0.5rem 1rem;
  color: var(--text-dim);
  font-family: var(--font-mono);
  font-size: 0.72rem;
  text-decoration: none;
  transition: color 0.2s;
}

.btn-back-home:hover {
  color: var(--text-secondary);
}

/* Sidebar collapse */
.sidebar-toggle {
  position: absolute;
  top: 12px;
  right: -14px;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  color: var(--text-secondary);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  z-index: 201;
  transition: all 0.2s;
}
.sidebar-toggle:hover {
  color: var(--cyan);
  border-color: var(--border-cyan);
  background: var(--bg-card);
}

.sidebar { transition: width 0.25s ease; }
.main-content { transition: margin-left 0.25s ease; }

body.sidebar-collapsed .sidebar { width: 60px; }
body.sidebar-collapsed .sidebar .logo-text { display: none; }
body.sidebar-collapsed .sidebar-logo { justify-content: center; }
body.sidebar-collapsed .sidebar-nav a { justify-content: center; padding: 0.7rem 0; font-size: 0; gap: 0; letter-spacing: 0; }
body.sidebar-collapsed .sidebar-nav a .nav-icon { font-size: 1.1rem; width: auto; }
body.sidebar-collapsed .sidebar-bottom { padding: 0.75rem 0.5rem; }
body.sidebar-collapsed .btn-new-agent { font-size: 0; padding: 0.6rem; letter-spacing: 0; }
body.sidebar-collapsed .btn-new-agent::after { content: '+'; font-size: 1.2rem; font-weight: 700; }
body.sidebar-collapsed .btn-back-home { display: none; }
body.sidebar-collapsed .main-content { margin-left: 60px; }
body.sidebar-collapsed .sidebar-toggle { transform: rotate(180deg); }
body.sidebar-collapsed #poc-connection-slot { display: none; }

/* ===================== MAIN LAYOUT ===================== */
.main-content {
  margin-left: 240px;
  min-height: 100vh;
}

/* ===================== TOP BAR ===================== */
.top-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1rem 2rem;
  background: rgba(6, 8, 13, 0.7);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 50;
}

.top-bar-left {
  display: flex;
  align-items: center;
  gap: 1.5rem;
}

.top-bar-title {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 1.2rem;
  color: var(--text-primary);
}

.top-bar-agent-filter select {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text-primary);
  font-family: var(--font-mono);
  font-size: 0.75rem;
  padding: 0.45rem 0.75rem;
  cursor: pointer;
  outline: none;
  transition: border-color 0.2s;
}

.top-bar-agent-filter select:focus {
  border-color: var(--cyan);
}

.top-bar-right {
  display: flex;
  align-items: center;
  gap: 1.5rem;
}

.top-bar-stats {
  display: flex;
  gap: 1.25rem;
  font-size: 0.72rem;
  color: var(--text-secondary);
}

.top-bar-stats span {
  display: flex;
  align-items: center;
  gap: 0.35rem;
}

.top-bar-stats .stat-val {
  color: var(--text-primary);
  font-weight: 600;
}

.eth-badge {
  padding: 0.3rem 0.8rem;
  border: 1px solid var(--border-cyan);
  border-radius: 100px;
  font-size: 0.62rem;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--cyan);
  background: var(--cyan-glow);
  white-space: nowrap;
}

/* ===================== PAGE BODY ===================== */
.page-body {
  padding: 1.75rem 2rem 3rem;
}

/* ===================== STATS BAR ===================== */
.stats-bar {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1rem;
  margin-bottom: 1.75rem;
}

.stat-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  transition: all 0.25s;
}

.stat-card:hover {
  border-color: var(--border-cyan);
  background: var(--bg-card-hover);
}

.stat-card .stat-label {
  font-size: 0.7rem;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 0.4rem;
}

.stat-card .stat-value {
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 1.5rem;
  color: var(--text-primary);
}

.stat-card .stat-value.green { color: var(--green); }
.stat-card .stat-value.amber { color: var(--amber); }
.stat-card .stat-value.cyan { color: var(--cyan); }

/* ===================== FILTER BAR ===================== */
.filter-bar {
  display: flex;
  align-items: center;
  gap: 1rem;
  margin-bottom: 1.75rem;
  flex-wrap: wrap;
}

.filter-bar label {
  font-size: 0.7rem;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

.filter-bar select {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text-primary);
  font-family: var(--font-mono);
  font-size: 0.78rem;
  padding: 0.5rem 0.85rem;
  cursor: pointer;
  outline: none;
  transition: border-color 0.2s;
  min-width: 140px;
}

.filter-bar select:focus {
  border-color: var(--cyan);
}

.filter-group {
  display: flex;
  align-items: center;
  gap: 0.4rem;
}

/* ===================== PROOF CARDS ===================== */
.proofs-list {
  display: flex;
  flex-direction: column;
  gap: 1.25rem;
}

.proof-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1.5rem;
  transition: all 0.3s ease;
}

.proof-card:hover {
  background: var(--bg-card-hover);
  border-color: rgba(0, 229, 255, 0.15);
  box-shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
}

.proof-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 1.25rem;
  padding-bottom: 1rem;
  border-bottom: 1px solid var(--border);
}

.proof-id {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 1.1rem;
}

.proof-status {
  padding: 0.35rem 0.9rem;
  border-radius: 100px;
  font-size: 0.75rem;
  font-weight: 600;
  letter-spacing: 0.02em;
}

.proof-status.verified {
  background: rgba(0, 230, 118, 0.1);
  color: var(--green);
  border: 1px solid rgba(0, 230, 118, 0.3);
}

.proof-status.pending {
  background: rgba(255, 179, 0, 0.1);
  color: var(--amber);
  border: 1px solid rgba(255, 179, 0, 0.3);
  animation: pulse-amber 2s ease-in-out infinite;
}

.proof-status.failed {
  background: rgba(255, 61, 90, 0.1);
  color: var(--red);
  border: 1px solid rgba(255, 61, 90, 0.3);
}

@keyframes pulse-amber {
  0%, 100% { box-shadow: 0 0 0 0 rgba(255, 179, 0, 0); }
  50% { box-shadow: 0 0 12px rgba(255, 179, 0, 0.2); }
}

.proof-details-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 1rem;
  margin-bottom: 1.25rem;
}

.detail-item {
  display: flex;
  flex-direction: column;
  gap: 0.2rem;
}

.detail-label {
  color: var(--text-dim);
  font-size: 0.68rem;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

.detail-value {
  color: var(--text-primary);
  font-weight: 600;
  font-size: 0.88rem;
}

.detail-value.amber {
  color: var(--amber);
}

.hash-value {
  color: var(--cyan);
  word-break: break-all;
  font-size: 0.78rem;
  font-weight: 400;
  opacity: 0.85;
}

.commitment-row {
  margin-bottom: 1rem;
}

/* Expand button */
.expand-btn {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  background: none;
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--cyan);
  cursor: pointer;
  font-family: var(--font-mono);
  font-size: 0.75rem;
  padding: 0.4rem 0.85rem;
  transition: all 0.2s;
}

.expand-btn:hover {
  background: rgba(0, 229, 255, 0.06);
  border-color: var(--border-cyan);
}

.expand-btn .arrow {
  transition: transform 0.25s;
  display: inline-block;
}

.expand-btn.open .arrow {
  transform: rotate(180deg);
}

/* Expandable content */
.proof-expandable {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.4s ease, opacity 0.3s ease;
  opacity: 0;
}

.proof-expandable.expanded {
  max-height: 800px;
  opacity: 1;
  margin-top: 1.25rem;
}

/* Policy checks */
.policy-checks {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 0.4rem;
  margin-bottom: 1.25rem;
}

.policy-check {
  display: flex;
  align-items: center;
  gap: 0.7rem;
  padding: 0.6rem 0.85rem;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: 8px;
}

.check-icon {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.75rem;
  flex-shrink: 0;
}

.check-icon.pass {
  background: rgba(0, 230, 118, 0.12);
  color: var(--green);
}

.check-rule {
  font-weight: 600;
  font-size: 0.82rem;
}

.check-details {
  font-size: 0.75rem;
  color: var(--text-secondary);
}

/* Code block */
.code-block {
  background: var(--bg-primary);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 1rem 1.25rem;
  font-family: var(--font-mono);
  font-size: 0.78rem;
  overflow-x: auto;
  margin-bottom: 1.25rem;
  line-height: 1.7;
}

.json-key { color: var(--cyan); }
.json-string { color: var(--green); }
.json-number { color: var(--amber); }
.json-boolean { color: var(--red); }

/* Chain details */
.chain-details {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.75rem;
}

/* Pending overlay */
.pending-message {
  margin-top: 1rem;
  padding: 0.85rem 1rem;
  background: rgba(255, 179, 0, 0.05);
  border: 1px solid rgba(255, 179, 0, 0.15);
  border-radius: 8px;
  color: var(--amber);
  font-size: 0.8rem;
  display: flex;
  align-items: center;
  gap: 0.6rem;
}

.pending-message .spinner {
  width: 14px;
  height: 14px;
  border: 2px solid rgba(255, 179, 0, 0.2);
  border-top-color: var(--amber);
  border-radius: 50%;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* Empty state */
.empty-state {
  text-align: center;
  padding: 4rem 2rem;
  color: var(--text-dim);
}

.empty-state .empty-icon {
  font-size: 2.5rem;
  margin-bottom: 1rem;
  opacity: 0.4;
}

.empty-state p {
  font-size: 0.85rem;
}

/* Responsive */
@media (max-width: 1100px) {
  .stats-bar { grid-template-columns: repeat(2, 1fr); }
}

@media (max-width: 768px) {
  .sidebar { display: none; }
  .main-content { margin-left: 0; }
  .stats-bar { grid-template-columns: 1fr 1fr; }
  .proof-details-grid { grid-template-columns: 1fr 1fr; }
  .chain-details { grid-template-columns: 1fr; }
  .filter-bar { flex-direction: column; align-items: flex-start; }
}
</style>
</head>

    policyChecks: [

      { rule: 'Value Threshold', detail: '500 USDC > 100 USDC \u2192 Ledger approval required', pass: true },
      { rule: 'Endpoint Allowlist', detail: 'api.aave.com is approved', pass: true },
      { rule: 'Prompt Injection', detail: 'No injection patterns detected', pass: true }
    ],
    verifiedOutput: {
      agent_id: 'alice-agent',
      policy_hash: '0x1234...5678',
      output_commitment: '0xef01...8901',
      all_checks_passed: true,
      requires_ledger_approval: true,
      action_value: 500000000
    },
    txHash: '0x1234567890abcdef1234567890abcdef1234567890abcdef1234567890abcdef',
    blockNumber: '12,345,650'
  },
  {
    id: '1236',
    agent: 'alice-agent',
    action: 'query',
    value: 0,
    currency: 'USDC',
    approval: 'Autonomous',
    timestamp: '2026-04-03 16:50:00 UTC',
    proofTime: '~15s remaining',
    proofTimeNum: null,
    status: 'pending',
    commitment: '0x5678abcd9012ef345678abcd9012ef345678abcd9012ef345678abcd9012ef34',
    policyChecks: [
      { rule: 'Tool Allowlist', detail: 'query is in allowed tools list', pass: true },
      { rule: 'Value Threshold', detail: '0 USDC \u2264 100 USDC autonomous limit', pass: true },
      { rule: 'Endpoint Allowlist', detail: 'api.coingecko.com is approved', pass: true },
      { rule: 'Prompt Injection', detail: 'No injection patterns detected', pass: true }
    ],
    verifiedOutput: null,
    txHash: null,
    blockNumber: null
  }
];

// ===================== STATE =====================
let proofs = JSON.parse(JSON.stringify(PROOFS));
let expandedProofs = new Set();

// ===================== HELPERS =====================
function getAgents() {
  try {
    const raw = localStorage.getItem('poc_agents');
    if (raw) return JSON.parse(raw);
  } catch (e) {}
  return [];
}

function getUrlParam(key) {
  return new URLSearchParams(window.location.search).get(key);
}

function formatJson(obj) {
  const lines = JSON.stringify(obj, null, 2).split('\n');
  return lines.map(line => {
    return line
      .replace(/"([^"]+)":/g, '<span class="json-key">"$1"</span>:')
      .replace(/: "([^"]*)"/g, ': <span class="json-string">"$1"</span>')
      .replace(/: (\d+)/g, ': <span class="json-number">$1</span>')
      .replace(/: (true|false)/g, ': <span class="json-boolean">$1</span>');
  }).join('\n');
}

// ===================== RENDER =====================
function renderProofs() {
  const agentFilter = document.getElementById('filterAgent').value;
  const statusFilter = document.getElementById('filterStatus').value;
  const actionFilter = document.getElementById('filterAction').value;

  let filtered = proofs.filter(p => {
    if (agentFilter !== 'all' && p.agent !== agentFilter) return false;
    if (statusFilter !== 'all' && p.status !== statusFilter) return false;
    if (actionFilter !== 'all' && p.action !== actionFilter) return false;
    return true;
  });

  const container = document.getElementById('proofsContainer');

  if (filtered.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">&#x2713;</div>
        <p>No proofs match the current filters.</p>
      </div>`;
    return;
  }

  container.innerHTML = filtered.map(proof => {
    const isExpanded = expandedProofs.has(proof.id);
    const statusClass = proof.status;
    const statusLabel = proof.status === 'verified' ? '\u2713 Verified On-Chain'
                      : proof.status === 'pending' ? '\u23F3 Generating...'
                      : '\u2717 Failed';
    const approvalStyle = proof.approval === 'Ledger Approved' ? ' class="detail-value amber"' : ' class="detail-value"';

    let expandableHTML = '';
    if (proof.status === 'verified') {
      const checksHTML = proof.policyChecks.map(c => `
        <li class="policy-check">
          <div class="check-icon pass">\u2713</div>
          <div>
            <div class="check-rule">${c.rule}</div>
            <div class="check-details">${c.detail}</div>
          </div>
        </li>`).join('');

      expandableHTML = `
        <div class="proof-expandable${isExpanded ? ' expanded' : ''}" id="expand-${proof.id}">
          <ul class="policy-checks">${checksHTML}</ul>
          <div class="code-block"><pre style="margin:0;white-space:pre-wrap;">${formatJson(proof.verifiedOutput)}</pre></div>
          <div class="chain-details">
            <div class="detail-item">
              <div class="detail-label">Transaction Hash</div>
              <div class="hash-value">${proof.txHash}</div>
            </div>
            <div class="detail-item">
              <div class="detail-label">Block Number</div>
              <div class="detail-value">${proof.blockNumber}</div>
            </div>
          </div>
        </div>`;
    }

    const pendingHTML = proof.status === 'pending' ? `
      <div class="pending-message" id="pending-msg-${proof.id}">
        <div class="spinner"></div>
        Proof generation in progress via Boundless proving marketplace...
      </div>` : '';

    const expandBtnHTML = proof.status === 'verified' ? `
      <button class="expand-btn${isExpanded ? ' open' : ''}" onclick="toggleExpand('${proof.id}')">
        <span class="arrow">\u25BC</span> ${isExpanded ? 'Hide Details' : 'Show Details'}
      </button>` : '';

    return `
      <div class="proof-card" data-proof-id="${proof.id}" data-agent="${proof.agent}" data-status="${proof.status}" data-action="${proof.action}">
        <div class="proof-header">
          <div class="proof-id">Proof #${proof.id}</div>
          <div class="proof-status ${statusClass}">${statusLabel}</div>
        </div>
        <div class="proof-details-grid">
          <div class="detail-item">
            <div class="detail-label">Agent ID</div>
            <div class="detail-value">${proof.agent}</div>
          </div>
          <div class="detail-item">
            <div class="detail-label">Action</div>
            <div class="detail-value">${proof.action}</div>
          </div>
          <div class="detail-item">
            <div class="detail-label">Value</div>
            <div class="detail-value">${proof.value} ${proof.currency}</div>
          </div>
          <div class="detail-item">
            <div class="detail-label">Approval Type</div>
            <div${approvalStyle}>${proof.approval}</div>
          </div>
          <div class="detail-item">
            <div class="detail-label">Timestamp</div>
            <div class="detail-value">${proof.timestamp}</div>
          </div>
          <div class="detail-item">
            <div class="detail-label">Proof Time</div>
            <div class="detail-value" id="proofTime-${proof.id}">${proof.proofTime}</div>
          </div>
        </div>
        <div class="commitment-row">
          <div class="detail-item">
            <div class="detail-label">Output Commitment</div>
            <div class="hash-value">${proof.commitment}</div>
          </div>
        </div>
        ${expandBtnHTML}
        ${expandableHTML}
        ${pendingHTML}
      </div>`;
  }).join('');

  updateStats(filtered);
}

function updateStats(filtered) {
  const total = filtered.length;
  const verified = filtered.filter(p => p.status === 'verified').length;
  const pending = filtered.filter(p => p.status === 'pending').length;
  const verifiedWithTime = filtered.filter(p => p.status === 'verified' && p.proofTimeNum);
  const avgTime = verifiedWithTime.length > 0
    ? Math.round(verifiedWithTime.reduce((s, p) => s + p.proofTimeNum, 0) / verifiedWithTime.length)
    : '--';
  const pct = total > 0 ? Math.round((verified / total) * 100) : 0;

  document.getElementById('statTotal').textContent = total;
  document.getElementById('statVerified').textContent = verified;
  document.getElementById('statPending').textContent = pending;
  document.getElementById('statAvgTime').textContent = avgTime !== '--' ? avgTime + 's' : '--';
  document.getElementById('statTotalInline').textContent = total;
  document.getElementById('statVerifiedInline').textContent = pct + '%';
}

function toggleExpand(proofId) {
  const el = document.getElementById('expand-' + proofId);
  const btn = el.previousElementSibling;
  if (expandedProofs.has(proofId)) {
    expandedProofs.delete(proofId);
    el.classList.remove('expanded');
    btn.classList.remove('open');
    btn.innerHTML = '<span class="arrow">\u25BC</span> Show Details';
  } else {
    expandedProofs.add(proofId);
    el.classList.add('expanded');
    btn.classList.add('open');
    btn.innerHTML = '<span class="arrow">\u25BC</span> Hide Details';
  }
}

// ===================== POPULATE FILTERS =====================
function populateAgentFilters() {
  const agents = getAgents();
  const agentNames = new Set(proofs.map(p => p.agent));
  agents.forEach(a => {
    const name = a.name || a.id;
    if (name) agentNames.add(name);
  });

  const selects = [document.getElementById('filterAgent'), document.getElementById('topAgentFilter')];
  selects.forEach(sel => {
    const current = sel.value;
    // keep the "All" option
    while (sel.options.length > 1) sel.remove(1);
    agentNames.forEach(name => {
      const opt = document.createElement('option');
      opt.value = name;
      opt.textContent = name;
      sel.appendChild(opt);
    });
    sel.value = current;
  });
}

// ===================== URL PARAM =====================
function applyUrlParams() {
  const agentParam = getUrlParam('agent');
  if (agentParam) {
    ['filterAgent', 'topAgentFilter'].forEach(id => {
      const sel = document.getElementById(id);
      for (let i = 0; i < sel.options.length; i++) {
        if (sel.options[i].value === agentParam) {
          sel.value = agentParam;
          break;
        }
      }
    });
    // Show back-to-dashboard link
    const backLink = document.getElementById('backToDashboard');
    backLink.style.display = 'inline';
    backLink.href = 'dashboard.html?agent=' + encodeURIComponent(agentParam);
  }
}

// ===================== EVENTS =====================
document.getElementById('filterAgent').addEventListener('change', function() {
  document.getElementById('topAgentFilter').value = this.value;
  renderProofs();
});
document.getElementById('topAgentFilter').addEventListener('change', function() {
  document.getElementById('filterAgent').value = this.value;
  renderProofs();
});
document.getElementById('filterStatus').addEventListener('change', renderProofs);
document.getElementById('filterAction').addEventListener('change', renderProofs);

// ===================== SIMULATE PROOF COMPLETION =====================
setTimeout(() => {
  const pending = proofs.find(p => p.id === '1236');
  if (pending && pending.status === 'pending') {
    pending.status = 'verified';
    pending.proofTime = '15s (Boundless)';
    pending.proofTimeNum = 15;
    pending.verifiedOutput = {
      agent_id: 'alice-agent',
      policy_hash: '0x1234...5678',
      output_commitment: '0x5678...ef34',
      all_checks_passed: true,
      requires_ledger_approval: false,
      action_value: 0
    };
    pending.txHash = '0xaabbccdd11223344aabbccdd11223344aabbccdd11223344aabbccdd11223344';
    pending.blockNumber = '12,345,700';
    renderProofs();
  }
}, 5000);

// ===================== INIT =====================
populateAgentFilters();
applyUrlParams();
renderProofs();
</script>
