<style>
/* ═══ TOPBAR ═══ */
.topbar {
  position: fixed;
  top: 0;
  left: var(--sidebar-w);
  right: 0;
  height: var(--topbar-h);
  background: rgba(6, 8, 13, 0.88);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 1.75rem;
  z-index: 150;
  transition: left 0.25s ease;
}

body.sidebar-collapsed .topbar { left: var(--sidebar-w-collapsed); }

.topbar-left {
  display: flex;
  align-items: center;
  gap: 1.25rem;
}

.topbar-title {
  font-family: var(--font-display);
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--text-primary);
}

.topbar-right {
  display: flex;
  align-items: center;
  gap: 1rem;
}

/* ═══ MAIN CONTENT ═══ */
.main-content {
  position: relative;
  z-index: 1;
  margin-left: var(--sidebar-w);
  margin-top: var(--topbar-h);
  padding: 1.75rem;
  min-height: calc(100vh - var(--topbar-h));
  transition: margin-left 0.25s ease;
}

body.sidebar-collapsed .main-content { margin-left: var(--sidebar-w-collapsed); }

/* ═══ RESPONSIVE ═══ */
@media (max-width: 768px) {
  .topbar { left: 0; }
  .main-content { margin-left: 0; }
}
</style>
</head>

<script type="module" src="viem-client.js"></script>

<script>
document.addEventListener('DOMContentLoaded', function() {
  // Configure your Google OAuth Client ID here
  // Get one at: https://console.cloud.google.com/apis/credentials
  const GOOGLE_CLIENT_ID = null; // Replace with: 'YOUR_CLIENT_ID.apps.googleusercontent.com'
  
  // NOTE: Testnet demo credentials — move to backend proxy before production
  const USER_AUTH_KEY = window.__POC_CONFIG?.USER_AUTH_KEY || 'ce87c003337354d7e906d4dbd30d133affce711449801f16b58ff1c6b2ddf327';
  const OPERATOR_AUTH_KEY = window.__POC_CONFIG?.OPERATOR_AUTH_KEY || 'ce87c003337354d7e906d4dbd30d133affce711449801f16b58ff1c6b2ddf327';

  // 1clawAI Configuration — testnet demo credentials
  const ONECLAW_API_KEY = window.__POC_CONFIG?.ONECLAW_API_KEY || 'ocv_XsJpRrM_b5aB7dcd-tzzg6yUzZSIuz2dlLs431DBs4U';
  const ONECLAW_ENDPOINT = window.__POC_CONFIG?.ONECLAW_ENDPOINT || 'https://api.1claw.xyz/v1';
  const AGENT_ID = window.__POC_CONFIG?.AGENT_ID || '61a7016a-b417-4f49-87f1-ade2ed1cf99b';
  const VAULT_ID = window.__POC_CONFIG?.VAULT_ID || '358ff77c-4c0d-4d1a-85a1-b25bde541cd8';
  
  PocAuthModules.mount('auth-modules-root', {
    googleClientId: GOOGLE_CLIENT_ID,
    userAuthKey: USER_AUTH_KEY,
    operatorAuthKey: OPERATOR_AUTH_KEY,
    oneclawApiKey: ONECLAW_API_KEY,
    oneclawEndpoint: ONECLAW_ENDPOINT,
    agentId: AGENT_ID,
    vaultId: VAULT_ID,
    onConnect: function(moduleId) {
      console.log('Connected to:', moduleId);
    },
    onDisconnect: function(moduleId) {
      console.log('Disconnected from:', moduleId);
    }
  });

  if (typeof updateWalletDisplay === 'function') {
    updateWalletDisplay();
  }
});
</script>
